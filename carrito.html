<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrito | MEZDI</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="css/carrito.css">


</head>


<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-mezdi">

        <div class="container">

            <!-- LOGO -->

            <a class="navbar-brand fw-bold" href="index.html">
                MEZDI
            </a>

            <!-- BOTON MOVIL -->

            <button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- MENU -->

            <div class="collapse navbar-collapse">

                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item">

                        <a class="nav-link nav-mezdi active" href="index.html">

                            Inicio

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link nav-mezdi" href="productos.html">

                            Productos

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link nav-mezdi" href="nosotros.html">

                            Nosotros

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link nav-mezdi" href="contacto.html">

                            Contacto

                        </a>

                    </li>

                    <li class="nav-item ms-3">

                        <a href="carrito.html" class="btn btn-navbar">

                            <i class="bi bi-cart3"></i>

                            Cotización

                            <span id="contadorCarrito" class="badge bg-danger">

                                0

                            </span>

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- reutilizaremos el mismo navbar -->

    <section class="carrito-section">


        <div class="container py-5">


            <h1 class="fw-bold mb-5">

                Solicitud de Cotización

            </h1>



            <div class="row">


                <!-- PRODUCTOS -->

                <div class="col-lg-8">


                    <div id="carrito-items">


                        <!-- Aquí aparecerán los productos -->
                    </div>


                </div>



                <!-- RESUMEN -->

                <div class="col-lg-4">


                    <div class="resumen">


                        <h3>

                            Resumen

                        </h3>


                        <hr>


                        <p>

                            Productos:

                            <span id="total-productos">

                                0

                            </span>

                        </p>



                        <p>

                            PIEZAS totales:

                            <span id="total-metros">

                                0

                            </span>

                        </p>



                        <button class="btn btn-primary w-100" onclick="irCotizacion()">

                            Solicitar Cotización

                        </button>



                    </div>


                </div>


            </div>


        </div>


    </section>



    <script src="js/carrito.js"></script>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/alertas.js"></script>
    <script src="js/navbar.js"></script>

</body>


</html>

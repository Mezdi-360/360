<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Solicitud de Cotización | MEZDI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/cotizacion.css">

</head>

<body class="bg-light">

    <section class="py-5">

        <div class="container">

            <div class="text-center mb-5">

                <h1 class="fw-bold">

                    Solicitud de Cotización

                </h1>

                <p class="text-secondary">

                    Complete la siguiente información para que un asesor de MEZDI se comunique con usted.

                </p>

            </div>

            <div class="row g-4">

                <!-- FORMULARIO -->

                <div class="col-lg-7">

                    <div class="card shadow border-0 rounded-4">

                        <div class="card-body p-4">

                            <h3 class="mb-4">

                                Información del Cliente

                            </h3>

                            <form id="formCotizacion">

                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Nombre Completo

                                        </label>

                                        <input type="text" class="form-control" id="nombre" required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Empresa

                                        </label>

                                        <input type="text" class="form-control" id="empresa" required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Correo

                                        </label>

                                        <input type="email" class="form-control" id="correo" required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Teléfono

                                        </label>

                                        <input type="tel" class="form-control" id="telefono" required>

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label class="form-label">

                                            País

                                        </label>

                                        <input type="text" class="form-control" id="pais" required>

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label class="form-label">

                                            Estado

                                        </label>

                                        <input type="text" class="form-control" id="estado" required>

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label class="form-label">

                                            Ciudad

                                        </label>

                                        <input type="text" class="form-control" id="ciudad" required>

                                    </div>

                                    <div class="col-12 mb-3">

                                        <label class="form-label">

                                            RFC (Opcional)

                                        </label>

                                        <input type="text" class="form-control" id="rfc">

                                    </div>

                                    <div class="col-12">

                                        <label class="form-label">

                                            Observaciones

                                        </label>

                                        <textarea class="form-control" rows="5" id="observaciones"></textarea>

                                    </div>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

                <!-- RESUMEN -->

                <div class="col-lg-5">

                    <div class="card shadow border-0 rounded-4 sticky-top">

                        <div class="card-body p-4">

                            <h3>

                                Resumen de la Cotización

                            </h3>

                            <hr>

                            <div id="productosCotizacion">

                                <!-- Aquí aparecerán los productos -->

                            </div>

                            <hr>

                            <div class="d-flex justify-content-between">

                                <strong>

                                    Productos

                                </strong>

                                <span id="totalProductos">

                                    0

                                </span>

                            </div>

                            <div class="d-flex justify-content-between">

                                <strong>

                                    PIEZAS

                                </strong>

                                <span id="totalMetros">

                                    0

                                </span>

                            </div>

                            <button class="btn btn-primary w-100 mt-4" id="btnEnviar">

                                <i class="bi bi-envelope-fill"></i>

                                Enviar Solicitud

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        emailjs.init({
            publicKey: "jWR-LHD-GV6w-lyHH"
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/cotizacion.js"></script>
    <script src="js/alertas.js"></script>
</body>

</html>
